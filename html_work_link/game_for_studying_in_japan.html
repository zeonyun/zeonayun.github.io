<!DOCTYPE html>
<html lang="en">

<style>

    color: white; /* 텍스트 색상을 흰색 검은 테두리로 설정 */
    text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
}

<body>
    <div class="linedot1"></div>
    <div class="linedot2"></div>

    </a><br><br>

    <img src="../works_images/exchange3.png" width="300"><br>
    <img src="../works_images/exchange5.png" width="300">

        <!-- 각 details에 id 추가 -->
        <a href="../html/works.html" id="back-top">back</a>

        <script>
            function saveState() {
                const worksDetailOpen = document.getElementById('worksDetail').open;
                const state = { mapDetailOpen, worksDetailOpen };
                history.replaceState(state, '');
            }
    
            function loadState() {
                const state = history.state;
                if (state) {
                    document.getElementById('worksDetail').open = state.worksDetailOpen;
                }
            }
    
            window.addEventListener('DOMContentLoaded', loadState);
        </script>
        <script>
            document.getElementById('back-top').addEventListener('click', function (e) {
              e.preventDefault();
              history.back();
            });
          </script>
</body>
