    <script>
        function saveState() {
            const worksDetailOpen = document.getElementById('worksDetail').open;
            const state = { mapDetailOpen, worksDetailOpen };
            history.replaceState(state, '');
        }

        function loadState() {
            const state = history.state;
            if (state) {
                document.getElementById('worksDetail').open = state.worksDetailOpen;
            }
        }

        window.addEventListener('DOMContentLoaded', loadState);
    </script>
    <script>
        document.getElementById('back-top').addEventListener('click', function (e) {
          e.preventDefault();
          history.back();
        });
