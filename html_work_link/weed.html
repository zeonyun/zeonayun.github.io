            function saveState() {
                const worksDetailOpen = document.getElementById('worksDetail').open;

            function loadState() {
                const state = history.state;
                if (state) {
                    document.getElementById('worksDetail').open = state.worksDetailOpen;
                }
            }
    
            window.addEventListener('DOMContentLoaded', loadState);
