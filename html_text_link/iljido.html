    <p class="important2">일知도</p>
    <p class="important3">
        동시대 미술은 ‘권력의 다원화’일지도.<br>
        <br>
        ‘정통의 다원화‘는 미술에 대한 다층적이고 심도있는 이해를 가능케.<br>
        -세잔의 사과, 전영백<br>
        <br>
        동시대 미술 속 탈장르를 포함한 여러 장르는 더 이상 하나의 사조, 지식 권력의 편향적 집중을 벗어나, 포화상태의 혼합매체 덩어리로의 변신을 끝낸 상태일지도.<br>
        <br>
        모두가 권력, 재능을 고루 받았다는 탈식민주의적 사고 아래 권력의 다원화. <br>
        <br>
        쓰읍 <br>
        <br>
        라기 보단 추가적으로 ’자본주의‘를 고려했을 때, 권력의 다원화 <<추구>>가 현 아트월드 주민들의 숙명일지도.<br>
    </p>
