    <p class="important2">검은 머리 짐승들</p>
    <p class="important3">
        부모 밑에 숨은 검은 머리 짐승들, 그들은 모순적이게도 매일같이 독립을 꿈꾼다. <br>
        그들의 몸집이 커질수록 편안했던 집도 떠나야만 하는 공간처럼 느껴진다. <br>
        아직 그늘 밑이 편한 그들에게 철저히 모른 척하고 싶은 무언의 압박감이 밀려온다. <br>
        결국 쫓기듯 나온 사회에서 그들은 혼자 남게되지만, 그 외로움은 독립으로 간주되지 못한다. <br>
        평가받아야 하는 우리들의 독립, 그 고귀한 독립을 위해 우리는 지금도.<br>
        우선 독립의 형태를 살펴보자.<br>
    </p>
