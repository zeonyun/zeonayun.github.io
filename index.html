<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeon Hyun</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.3.1/p5.js"></script>

    <style>
        /* Flexbox로 이미지 정 가운데 배치 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            justify-content: center;
            align-items: center;
            background-color: white;
            color: black;
            font-family: Verdana;
        }

        #canvasContainer {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .fullscreen-image {
        position: relative;          /* ⭐ 이미지/텍스트의 기준점 */
        text-decoration: none;       /* 밑줄 제거 */
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        }
        
        .fullscreen-image img {
        max-width: 90vw;
        max-height: 90vh;
        width: auto;
        height: auto;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%); /* ← 다시 원래대로 */
        }


        /*.linedot1 {
            position: absolute;
            width: 100%;
            height: 10px;
            border-top: 8px dotted rgb(0, 0, 0, 0.1); 
            top: 30px;
        }
        
        .linedot2 {
            position: fixed;
            width: 100%;
            height: 30px;
            border-top: 8px dotted rgb(0, 0, 0, 0.1); 
            background-color: white;
            bottom: 0px;
        }*/

        body, html {

        margin: 0; /* 기본 여백 제거 */
        padding: 0;
        height: 100vh;  /* 전체 높이 */
      }
         .fullscreen-image .imtext {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 30pt;
        font-family: 'Times New Roman', Times, serif;
        font-weight: bold;
        color: black;
        transition: color 0.2s ease;
        white-space: nowrap;
        pointer-events: auto;
}


        /* 텍스트 위에 커서 올렸을 때만 파란색 */
        .fullscreen-image .imtext:hover {
        color: blue;
        }

        /* 모바일 */
        @media (max-width: 768px) {
        .fullscreen-image .imtext {
            font-size: 20pt;
        }

        /* 모바일에서 전체 덩어리 위로 */
        #canvasContainer {
            transform: translateY(-5vh);
        }
        }



    </style>
</head>

<body onload="showImage()">
    <div id="canvasContainer">
        <a href="./html/list2.html" class="fullscreen-image">
          <img id="introImg" alt="randomImage"/>
          <span class="imtext">jeon ahyun</span>

        </a>
    </div>

        
     <script>   
     
        var imgArray= new Array();
        imgArray[0]="../images_for_tenzi/1.png";  //사진
        imgArray[1]="../images_for_tenzi/1-1.png"; //사진
        imgArray[2]="../images_for_tenzi/2.png"; //사진
        imgArray[3]="../images_for_tenzi/2-1.png"; //사진
 
        
        function showImage() {
    const isMobile = window.innerWidth <= 768;

    let imgArray;

    if (isMobile) {
      // 📱 모바일: 2 / 2-1만
      imgArray = [
        "../images_for_tenzi/2.png",
        "../images_for_tenzi/2-1.png"
      ];
    } else {
      // 🖥 데스크탑: 전부
      imgArray = [
        "../images_for_tenzi/1.png",
        "../images_for_tenzi/1-1.png",
        "../images_for_tenzi/2.png",
        "../images_for_tenzi/2-1.png"
      ];
    }

    const imgNum = Math.floor(Math.random() * imgArray.length);
    document.getElementById("introImg").src = imgArray[imgNum];
  }
        
        
    </script>
</body>
</html>
